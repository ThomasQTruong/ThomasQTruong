<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="styles/style.css">
    <script src="js/main.js" defer></script>

    <title>Thomas Truong</title>
  </head>
  <body>
    <!-- Navigation bar. -->
    <nav>
      <div class="nav-container">
        <div class="hero-li">
          <a href="#hero" aria-current="page">Thomas Truong</a>
        </div>
        <ul id="nav-list" class="y-scrollable">
          <li>
            <a href="#experience" class="nav-item">
              <i class="fa-solid fa-user" aria-hidden="true"></i>
              <span>Experience</span>
            </a>
          </li>
          <li>
            <a href="#skills" class="nav-item">
              <i class="fa-solid fa-code" aria-hidden="true"></i>
              <span>Skills</span>
            </a>
          </li>
          <li class="projects-container">
            <button id="projects-btn" class="nav-item"
                    aria-label="Projects"
                    aria-expanded="false"
                    aria-haspopup="true"
                    aria-controls="projects-list">
              <i class="fa-solid fa-folder-open" aria-hidden="true"></i>
              <span>Projects</span>
              <i class="dropdown-icon fa-solid fa-chevron-down" aria-hidden="true"></i>
            </button>
            <div id="projects-list" inert>
              <a href="#projects">Test1</a>
              <a href="#projects">Test2</a>
              <a href="#projects">Test3</a>
            </div>
          </li>
          <li class="nav-cta">
            <a href="#contact" class="nav-item">
              <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
              <span>Contact</span>
            </a>
          </li>
        </ul>
        <span class="nav-divider"></span>
        <div id="nav-right-btns">
          <button id="theme-btn" class="nav-item"
                  aria-label="Switch to light mode"
                  aria-pressed="false">
            <i class="fa-solid fa-sun" aria-hidden="true"></i>
          </button>
          <button id="sidebar-btn"
                  aria-label="Menu"
                  aria-expanded="false"
                  aria-controls="nav-list">
            <i id="nav-hamburger" class="fa-solid fa-bars" aria-hidden="true"></i>
            <i id="nav-close" class="fa-solid fa-x" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </nav>

    <div id="nav-list-background"></div>

    <main>
      <!-- Section 1: Hero. -->
      <section id="hero"></section>

      <!-- Section 2: Experience. -->
      <section id="experience"></section>

      <!-- Section 3: Skills. -->
      <section id="skills"></section>

      <!-- Section 4: Projects. -->
      <section id="projects"></section>

      <!-- Section 5: Contact. -->
      <section id="contact"></section>
    </main>
  </body>
</html>
